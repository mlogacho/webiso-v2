{% extends "layout.html" %}

{% block content %}
<form action="{{ url_for('submit_survey') }}" method="post">
    <h2>Cuestionario</h2>
    <p>Responde las preguntas del 1 (Poco/Nada) al 5 (Mucho).</p>

    {% for q_id, q_text in questions.items() %}
    <div class="question-card">
        <p><strong>{{ q_id }}. {{ q_text }}</strong></p>

        <div class="radio-group">
            {% for i in range(1, 6) %}
            <div class="radio-option">
                <input type="radio" id="q{{ q_id }}_{{ i }}" name="{{ q_id }}" value="{{ i }}" required>
                <label for="q{{ q_id }}_{{ i }}">{{ i }}</label>
            </div>
            {% endfor %}
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 5px;">
            <span>Poco</span>
            <span>Mucho</span>
        </div>
    </div>
    {% endfor %}

    <div style="text-align: center;">
        <button type="submit" class="btn">Ver Resultados</button>
    </div>
</form>
{% endblock %}
