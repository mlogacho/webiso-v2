{% extends "layout.html" %}

{% block content %}
<div style="text-align: center; padding: 40px;">
    <h2>Bienvenido a la Evaluación</h2>
    <p>Por favor ingresa tus datos para comenzar.</p>

    <form action="{{ url_for('start_survey') }}" method="post"
        style="max-width: 400px; margin: 0 auto; text-align: left;">
        <div class="form-group">
            <label for="name">Nombre Completo:</label>
            <input type="text" id="name" name="name" required placeholder="Ej: Juan Pérez">
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required placeholder="Ej: juan@example.com">
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" class="btn">Comenzar Evaluación</button>
        </div>
    </form>
</div>
{% endblock %}
