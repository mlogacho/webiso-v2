server {
    listen 8081;
    server_name 10.11.121.58 intranetiso intranetiso900127001 datacom.intranet.iso;

    root /var/www/webiso;
    index index.html;

    # Gzip compression for speed
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Error logs
    error_log /var/log/nginx/webiso_error.log;
    access_log /var/log/nginx/webiso_access.log;
}
